<script>
        function toggleAuth(mode) {
            const signupFields = document.getElementById('signup-fields');
            const portalTitle = document.getElementById('portal-title');
            const tabSignin = document.getElementById('tab-signin');
            const tabSignup = document.getElementById('tab-signup');
            const forgotLink = document.getElementById('forgot-link');

            if (mode === 'signup') {
                signupFields.classList.remove('hidden');
                setTimeout(() => signupFields.classList.remove('opacity-0'), 10);
                portalTitle.innerText = 'Patient Portal - Create Account';
                tabSignup.className = 'pb-base px-md font-label-md text-label-md text-primary border-b-2 border-primary transition-all duration-300';
                tabSignin.className = 'pb-base px-md font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all duration-300';
                forgotLink.style.visibility = 'hidden';
            } else {
                signupFields.classList.add('opacity-0');
                setTimeout(() => signupFields.classList.add('hidden'), 500);
                portalTitle.innerText = 'Patient Portal - Sign In';
                tabSignin.className = 'pb-base px-md font-label-md text-label-md text-primary border-b-2 border-primary transition-all duration-300';
                tabSignup.className = 'pb-base px-md font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all duration-300';
                forgotLink.style.visibility = 'visible';
            }
        }

        // Atmospheric Micro-interaction: Mouse tracking glow
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(158, 61, 0, 0.05), #f7f9ff 60%)`;
        });
    </script>
